<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup F01 - Login Platform AI Starter</title>
    <link rel="stylesheet" href="global-style.css">
</head>
<body>

    <!-- Link back to specification for AI & Developers -->
    <a href="../features/F01-manajemen-user.md" class="spec-badge" id="btn-spec-ref">
        📄 Spec: F01-manajemen-user.md
    </a>

    <div class="mockup-card">
        <div class="mockup-header">
            <h1>AI Starter Platform</h1>
            <p>Selamat datang kembali! Silakan masuk ke akun Anda.</p>
        </div>

        <form id="login-mockup-form" onsubmit="event.preventDefault(); alert('Ini adalah mockup statis F01! Logika asli ada di folder src/.');">
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="contoh: john@example.com" required>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
            </div>

            <button type="submit" class="form-button" id="btn-login-submit">
                Masuk
            </button>
        </form>

        <div class="form-footer">
            Belum punya akun? <a href="#" id="link-register">Daftar Sekarang</a>
        </div>
    </div>

</body>
</html>
